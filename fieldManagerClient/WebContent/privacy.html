<main class="container-fluid">

	<div id="dpo_access_denied" class="alert alert-danger mt-3 d-none" role="alert">
		<span class="lang" data-lang="msg_no_access">Access denied</span>
	</div>

	<!-- DSAR Section -->
	<div class="card mt-3" id="dsar_card">
		<div class="card-header">
			<h5 class="mb-0 lang" data-lang="m_dsar">Data Subject Access Request (DSAR)</h5>
		</div>
		<div class="card-body">
			<p class="text-muted lang" data-lang="dsar_desc">Export all data held for a data subject as a ZIP file.</p>
			<form id="dsar_form" class="row g-3">
				<div class="col-sm-6">
					<label for="dsar_ident" class="form-label lang" data-lang="c_identifier">Identifier</label>
					<input type="text" id="dsar_ident" class="form-control" placeholder="">
				</div>
				<div class="col-12">
					<div class="form-check">
						<input class="form-check-input" type="checkbox" id="dsar_partial">
						<label class="form-check-label lang" data-lang="dsar_partial" for="dsar_partial">Partial match (use for name searches; may return false positives)</label>
					</div>
				</div>
				<div class="col-sm-6 d-flex align-items-end">
					<button id="dsar_submit" type="button" class="btn btn-primary lang" data-lang="c_export">Export</button>
				</div>
			</form>
			<div id="dsar_result" class="mt-3"></div>
		</div>
	</div>

	<!-- RTBF Section -->
	<div class="card mt-3" id="rtbf_card">
		<div class="card-header">
			<h5 class="mb-0 lang" data-lang="m_rtbf">Right to be Forgotten</h5>
		</div>
		<div class="card-body">
			<p class="text-muted lang" data-lang="rtbf_desc"></p>

			<!-- Phase 1: search -->
			<div class="row g-3">
				<div class="col-sm-6">
					<label for="rtbf_ident" class="form-label lang" data-lang="c_identifier">Identifier</label>
					<input type="text" id="rtbf_ident" class="form-control">
				</div>
				<div class="col-12">
					<div class="form-check">
						<input class="form-check-input" type="checkbox" id="rtbf_partial">
						<label class="form-check-label lang" data-lang="dsar_partial" for="rtbf_partial"></label>
					</div>
				</div>
				<div class="col-12">
					<button id="rtbf_search" type="button" class="btn btn-secondary lang" data-lang="c_search">Search</button>
				</div>
			</div>

			<!-- Phase 2: review and redact (hidden until search returns results) -->
			<div id="rtbf_results" class="mt-3 d-none">
				<p class="lang" data-lang="rtbf_select_prompt"></p>
				<div class="table-responsive">
					<table class="table table-sm table-bordered table-hover">
						<thead class="table-light">
							<tr>
								<th><input type="checkbox" id="rtbf_select_all" title="Select all"></th>
								<th class="lang" data-lang="c_project">Project</th>
								<th class="lang" data-lang="c_survey">Survey</th>
								<th class="lang" data-lang="c_form">Form</th>
								<th class="lang" data-lang="c_status">Status</th>
								<th class="lang" data-lang="c_data">Personal data</th>
							</tr>
						</thead>
						<tbody id="rtbf_tbody"></tbody>
					</table>
				</div>
				<button id="rtbf_redact" type="button" class="btn btn-warning lang" data-lang="rtbf_redact_selected">Redact Selected</button>
			</div>

			<div id="rtbf_result" class="mt-3"></div>
		</div>
	</div>
