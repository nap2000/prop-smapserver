<style>
/* ---- Edit drawer ---- */
#wf-drawer {
    position: fixed;
    top: 56px;
    right: -380px;
    width: 360px;
    height: calc(100vh - 56px);
    background: #fff;
    box-shadow: -2px 0 16px rgba(0,0,0,0.18);
    z-index: 200;
    transition: right 0.22s ease;
    display: flex;
    flex-direction: column;
    font-family: sans-serif;
    font-size: 13px;
}
#wf-drawer.open { right: 0; }

#wf-drawer-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 14px 10px;
    border-bottom: 1px solid #dee2e6;
    background: #f8f9fa;
    flex-shrink: 0;
}
#wf-drawer-title { font-weight: 700; font-size: 14px; color: #212529; flex: 1; }
#wf-drawer-close {
    background: none; border: none; font-size: 18px; line-height: 1;
    color: #6c757d; cursor: pointer; padding: 0 4px;
}
#wf-drawer-close:hover { color: #212529; }

#wf-drawer-body {
    flex: 1;
    overflow-y: auto;
    padding: 14px;
}

.wf-field { margin-bottom: 12px; }
.wf-field label { display: block; font-weight: 600; color: #495057; margin-bottom: 4px; font-size: 12px; }
.wf-field input[type="text"],
.wf-field textarea,
.wf-field select {
    width: 100%; padding: 6px 8px; border: 1px solid #ced4da;
    border-radius: 4px; font-size: 13px; box-sizing: border-box;
}
.wf-field textarea { min-height: 72px; resize: vertical; }
.wf-field-inline { display: flex; align-items: center; gap: 10px; }
.wf-field-inline label { margin-bottom: 0; }

/* Condition section — amber, matching decision card */
#wf-conditions {
    margin-top: 4px;
    border-top: 2px solid #fd7e14;
    background: #fff3cd;
    padding: 10px 14px 14px;
    flex-shrink: 0;
}
#wf-conditions-title {
    font-weight: 700; font-size: 12px; color: #854d0e;
    display: flex; align-items: center; gap: 6px; margin-bottom: 10px;
}
.wf-cond-row { margin-bottom: 10px; }
.wf-cond-from { display: block; font-size: 11px; color: #6c757d; margin-bottom: 3px; font-style: italic; }
.wf-cond-input { width: 100%; padding: 5px 8px; border: 1px solid #ffc107; border-radius: 4px; font-size: 12px; background: #fff; box-sizing: border-box; }

#wf-drawer-footer {
    display: flex;
    gap: 8px;
    padding: 10px 14px;
    border-top: 1px solid #dee2e6;
    background: #f8f9fa;
    flex-shrink: 0;
    flex-wrap: wrap;
}
#wf-drawer-footer .btn { font-size: 13px; }
#wf-drawer-advanced { margin-left: auto; font-size: 12px; }

/* Selected node highlight (trigger for Add Step) */
.wf-selected { outline: 2px solid #f0a500 !important; outline-offset: 2px; }

/* Right-edge connector badge — appears on selected node */
.wf-connector-badge {
    position: absolute;
    right: -14px;
    top: 50%;
    transform: translateY(-50%);
    width: 28px; height: 28px;
    border-radius: 50%;
    background: #f0a500;
    color: #fff;
    border: 2px solid #fff;
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.22);
    z-index: 50;
    transition: background 0.15s, transform 0.15s;
}
.wf-connector-badge:hover {
    background: #d4890a;
    transform: translateY(-50%) scale(1.15);
}

/* Edit button on node cards */
.wf-node-edit-btn {
    background: none; border: none; padding: 2px 5px; cursor: pointer;
    color: #6c757d; font-size: 11px; line-height: 1; border-radius: 3px;
    margin-left: auto;
}
.wf-node-edit-btn:hover { color: #0d6efd; background: #e9ecef; }

/* "+" add button — floating on canvas */
#wf-add-btn {
    position: fixed;
    bottom: 28px;
    right: 28px;
    width: 48px; height: 48px;
    border-radius: 50%;
    background: #0d6efd;
    color: #fff;
    border: none;
    font-size: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(13,110,253,0.4);
    z-index: 150;
    transition: background 0.15s;
}
#wf-add-btn:hover { background: #0b5ed7; }
</style>
