    <div class="row" id="ops_unit_stats"></div>

    <div class="row g-3 mt-1">
        <div class="col-lg-8">
            <div class="card h-100">
                <div class="card-header lang" data-lang="ops_throughput">Throughput</div>
                <div class="card-body">
                    <canvas id="ops_unit_chart" height="110"></canvas>
                </div>
            </div>
        </div>
        <div class="col-lg-4">
            <div class="card h-100">
                <div class="card-header lang" data-lang="ops_backlog">Case backlog</div>

                    <canvas id="ops_unit_backlog" height="110"></canvas>
                </div>
            </div>
        </div>
    </div>

                                <th class="lang" data-lang="ops_item">Item</th>
